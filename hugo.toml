baseURL = 'https://dinozorlarlakafautuleme.com/'
theme = "mana"
defaultContentLanguage = "tr"

[pagination]
  pageSize = 10

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-macchiato"

[outputs]
  home = ["HTML", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  enableIntegrity = false
  relatedPostsCount = 3

  [params.social]
    youtube = "https://www.youtube.com/watch?v=NVrLpP61lqA&list=PLTzpV7jb-qW-YKnOPQ6Yjd8kF-SAQWa-V"
    linkedin = "https://www.linkedin.com/in/alperkonuralp"
    twitter = "intechnow"

  # [params.avatar]
  #   assetPath = "images/logo.png"  # Logo eklenince aktif et

  [params.codeHighlight]
    darkTheme = "catppuccin-macchiato"
    lightTheme = "catppuccin-frappe"

  [params.copyright]
    startYear = 2024
    owner = "Alper Konuralp & Burak Selim Şenyurt"

  [params.admonitions]
    alertStyle = "favicon"

[languages.tr]
  languageCode = "tr-TR"
  languageName = "Türkçe"
  languageDirection = "ltr"
  contentDir = "content/tr"
  weight = 1
  title = "Dinozorlarla Kafa Ütüleme"

  [languages.tr.params]
    description = "90'lı yıllardan beri yazılım dünyasında olan iki deneyimli geliştiricinin teknoloji sohbetleri"
    author = "Alper Konuralp & Burak Selim Şenyurt"
    heroTitleLine1 = "Dinozorlarla"
    heroTitleLine2 = "Kafa Ütüleme"
    custom404Message = "Aradığınız sayfa bulunamadı."
    footerText = '<a href="https://www.youtube.com/watch?v=NVrLpP61lqA&amp;list=PLTzpV7jb-qW-YKnOPQ6Yjd8kF-SAQWa-V" target="_blank" rel="noopener noreferrer">DKU Oynatma Listesi</a> · <a href="https://www.youtube.com/@AlperKonuralp" target="_blank" rel="noopener noreferrer">Alper Konuralp</a> · <a href="https://www.youtube.com/@burakselimsenyurt" target="_blank" rel="noopener noreferrer">Burak Selim Şenyurt</a>'

  [[languages.tr.menus.main]]
    name = "Ana Sayfa"
    pageRef = "/"
    weight = 10

  [[languages.tr.menus.main]]
    name = "Bölümler"
    pageRef = "/posts"
    weight = 20

  [[languages.tr.menus.main]]
    name = "Blog"
    pageRef = "/blog"
    weight = 30

  [[languages.tr.menus.main]]
    name = "Hakkımızda"
    url = "/about/"
    weight = 40

[languages.en]
  languageCode = "en-US"
  languageName = "English"
  languageDirection = "ltr"
  contentDir = "content/en"
  weight = 2
  title = "Dinozorlarla Kafa Ütüleme"

  [languages.en.params]
